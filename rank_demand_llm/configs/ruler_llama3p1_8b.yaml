# Replication: RULER x meta-llama/Llama-3.1-8B-Instruct
model_id: meta-llama/Llama-3.1-8B-Instruct
seed: 1234
dtype: auto
load_4bit: false
attn_implementation_measure: eager
attn_implementation_generate: sdpa
max_new_tokens: 64

# separate data dir: RULER lengths are tokenizer-dependent
data_dir: results/data_llama
output_dir: results/llama_run

tasks:
  niah_single_1: single_needle
  niah_multikey_1: multi_needle
  vt: multi_hop_tracing
  cwe: aggregation
  qa_1: qa

smoke:
  context_lengths: [1024, 2048]
  num_samples: 5

main:
  context_lengths: [1024, 2048, 4096, 8192]
  num_samples: 50

metrics:
  layer_fractions: [0.0, 0.25, 0.5, 0.75, 1.0]
  center_hidden: true
  hidden_subsample_max_tokens: 8192
  exact_attention_max_tokens: 2048
  allow_exact_attention_4096: false
  exact_rank_max_tokens: 1024
  block_size: 64
  all_heads_max_tokens: 1024
  sampled_heads: [0, middle, last]
  evidence_ks: [8, 16, 32, 64, 128, 256]
  score_matrix: true
  store_attention: false
  truncation_ks: [4, 8, 16, 32, 64, 128]
